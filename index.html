<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цвітіння води - Проєкт</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.4);
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
        }

        /* --- ФОН ТА ЕФЕКТИ --- */
        .ocean-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a1d2e 0%, #050a18 100%);
        }

        /* Частинки "планктон" */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, var(--accent-glow) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, var(--accent-glow) 1.5px, transparent 1.5px),
                radial-gradient(circle at 40% 80%, #fff 1px, transparent 1px);
            background-size: 100px 100px, 150px 150px, 200px 200px;
            animation: drift 20s linear infinite;
            opacity: 0.5;
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            position: relative;
            padding: 20px;
        }

        /* --- ГОЛОВНИЙ СЛАЙД --- */
        .hero h1 {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--accent-glow));
            line-height: 0.9;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .hero p.subtitle {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--accent);
            opacity: 0.8;
            margin-bottom: 40px;
        }

        /* Декоративне кільце навколо імена */
        .author-wrapper {
            position: relative;
            padding: 40px;
        }

        .author-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid var(--accent);
            border-radius: 100px;
            opacity: 0.2;
            transform: scale(1.1);
            animation: pulse-ring 4s infinite ease-in-out;
        }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1.1); opacity: 0.1; }
            50% { transform: scale(1.15); opacity: 0.3; }
        }

        .authors {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .author-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 12px 25px;
            border-radius: 30px;
            text-align: left;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .author-card:hover {
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .author-card span {
            font-size: 10px;
            color: var(--accent);
            display: block;
            margin-bottom: 4px;
        }

        /* Стрілочка вниз */
        .mouse {
            width: 25px;
            height: 40px;
            border: 2px solid var(--text);
            border-radius: 20px;
            position: absolute;
            bottom: 30px;
            opacity: 0.6;
        }
        .mouse::before {
            content: '';
            width: 4px;
            height: 8px;
            background: var(--accent);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 8px;
            border-radius: 2px;
            animation: scroll-anim 2s infinite;
        }

        @keyframes scroll-anim {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 15px); }
        }

    </style>
</head>
<body>

    <div class="ocean-bg">
        <div class="particles"></div>
    </div>

    <section class="hero">
        <p class="subtitle">Biology Project</p>
        <h1>Цвітіння<br>води</h1>
        
        <div class="author-wrapper">
            <div class="authors">
                <div class="author-card">
                    <span>Виконав учень:</span>
                    <strong>Роман Бабельський</strong>
                </div>
                <div class="author-card">
                    <span>Виконав учень:</span>
                    <strong>Матвій Смольницький</strong>
                </div>
            </div>
        </div>

        <div class="mouse"></div>
    </section>

    <section style="background: rgba(0,0,0,0.3);">
        <h2 style="color: var(--accent);">Далі буде контент...</h2>
    </section>

</body>
</html>
